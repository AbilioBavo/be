services:
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - ./supabase/dev/volumes/data:/data # O Docker cria esta pasta se não existir
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db

  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dbpass
      POSTGRES_DB: buildeasy
    volumes:
      - db-config:/var/lib/postgresql/data # O Docker gere isto sozinho

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: storagepass
    volumes:
      - minio_data:/data # O Docker gere isto sozinho
    command: server /data --console-address ":9001"

# Esta secção é CRUCIAL para o db-config e minio_data funcionarem
volumes:
  db-config:
  minio_data:
